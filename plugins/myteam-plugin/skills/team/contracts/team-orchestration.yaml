name: team-orchestration
version: 2.4.0
description: Strong contract for MyTeam Router, Contract Officer, optional PM, conditional CTO, specialist, validation, delegation, integration, and final response flow.

input:
  requirement_spec:
    type: string
    required: true
    description: User request restated as an actionable requirement.
  priority:
    type: enum
    values:
      - low
      - medium
      - high
      - urgent
    required: true
  constraints:
    type: array
    items: string
    required: true
  available_context:
    type: array
    items: string
    required: true
  requested_scope:
    type: string
    required: true

router_decision:
  mode:
    type: enum
    values:
      - light
      - standard
      - deep
    required: true
  taskType:
    type: string
    required: true
  requiredAgents:
    type: array
    items: string
    required: true
  requiresContractOfficer:
    type: boolean
    required: true
  contractOfficerMode:
    type: enum
    values:
      - none
      - assign_only
      - validate_only
      - assign_and_validate
    required: true
  requiresPM:
    type: boolean
    required: true
  requiresCTO:
    type: boolean
    required: true
  requiresQA:
    type: boolean
    required: true
  requiresSecurity:
    type: boolean
    required: true
  tokenBudget:
    type: enum
    values:
      - low
      - medium
      - high
    required: true
  executionStrength:
    type: enum
    values:
      - minimal
      - normal
      - strong
    required: true
    description: Strong execution requires explicit routing, contract validation, feasible verification, and eligible delegation without exceeding the overuse guard.
  executionPattern:
    type: enum
    values:
      - direct_response
      - agent_loop
      - wide_parallel
      - scheduled
      - monitoring
    required: false
    description: Agentic execution pattern. Use agent_loop for actionable tasks, wide_parallel for independent repeated items, and scheduled or monitoring for automation requests.
  executionSurface:
    type: enum
    values:
      - none
      - local_workspace
      - local_browser
      - cloud_browser
      - external_connector
      - automation
      - mixed
    required: false
    description: Surface where execution happens. Browser, connector, automation, and mixed surfaces require explicit safety handling.
  requiresApprovalGate:
    type: boolean
    required: false
  requiresPersistentState:
    type: boolean
    required: false
  requiresArtifactManifest:
    type: boolean
    required: false
  requiresScheduling:
    type: boolean
    required: false
  requiresWideParallelism:
    type: boolean
    required: false
  delegation:
    type: object
    required: true
    fields:
      shouldDelegate:
        type: boolean
        required: true
      allowedAgentType:
        type: enum
        values:
          - none
          - explorer
          - worker
          - explorer_and_worker
        required: true
      maxSubAgents:
        type: number
        minimum: 0
        maximum: 6
        required: true
      reason:
        type: string
        required: true
      skipReason:
        type: string
        required: true
      runtimeSubAgentsAvailable:
        type: boolean
        required: true
      distinctOwnershipReason:
        type: string
        required: true
      blockingReasonIfNotDelegated:
        type: string
        required: true
  overuseGuard:
    type: object
    required: true
    fields:
      singleAgentSufficient:
        type: boolean
        required: true
      excludedAgents:
        type: array
        items: string
        required: true
      exclusionReasons:
        type: array
        items: string
        required: true
      scopeLimit:
        type: string
        required: true

mandatory_quality_gates:
  router_first:
    type: boolean
    required: true
    must_equal: true
    failure_action: reject_output
    description: Router decision must exist before PM, CTO, specialist, QA, Security, Coder, Integrator, or final answer work.
  required_roles_executed_or_blocked:
    type: boolean
    required: true
    must_equal: true
    failure_action: reject_output
    description: Every Router-selected required role must either produce an accepted contract or be explicitly marked unavailable, blocked, skipped by a newer instruction, or blocked by tool policy.
  contract_officer_before_delegation:
    type: boolean
    required: true
    must_equal: true
    failure_action: reject_output
    description: When delegation, implementation, or contract validation is required, Contract Officer assignment must happen before specialist execution.
  distinct_delegation_ownership:
    type: boolean
    required: true
    must_equal: true
    failure_action: reject_output
    description: Delegated agents must have distinct owned scopes; duplicate confidence-check delegation is invalid.
  delegated_outputs_validated:
    type: boolean
    required: true
    must_equal: true
    failure_action: reject_output
    description: Delegated outputs must be validated before Integrator, CTO Integration, or final response consumes them.
  unavailable_outputs_excluded:
    type: boolean
    required: true
    must_equal: true
    failure_action: reject_output
    description: Timed-out, unavailable, rejected, or malformed delegated outputs must not be merged into Specialist Results or presented as validation.
  verification_honesty:
    type: boolean
    required: true
    must_equal: true
    failure_action: reject_output
    description: Failed, blocked, skipped, or not-run verification must be reported as such and cannot be normalized into success.
  conditional_risk_not_downplayed:
    type: boolean
    required: true
    must_equal: true
    failure_action: revise
    description: Conditional data-loss, migration, security, or production-regression risks must be promoted to findings instead of buried after a no-issues statement.
  actionable_work_uses_agent_loop:
    type: boolean
    required: true
    must_equal: true
    failure_action: revise
    description: Actionable work must have goal, plan, action, observation, verification, and stopping condition unless routed as direct_response.
  approval_before_external_side_effect:
    type: boolean
    required: true
    must_equal: true
    failure_action: ask_user
    description: Browser, connector, authenticated, destructive, purchase, posting, messaging, or cross-workspace actions require approval before execution.
  artifact_manifest_current:
    type: boolean
    required: true
    must_equal: true
    failure_action: revise
    description: Created or modified deliverables must be listed in the artifact manifest with status.
  checkpoint_for_resumable_work:
    type: boolean
    required: true
    must_equal: true
    failure_action: revise
    description: Long-running, scheduled, interrupted, or resumable work must record the last verified step, next action, and remaining risks.
  wide_parallel_independence_verified:
    type: boolean
    required: true
    must_equal: true
    failure_action: reject_output
    description: Wide parallel work must prove item independence and validate outputs before synthesis.
  final_decision_present:
    type: boolean
    required: true
    must_equal: true
    failure_action: revise
    description: Review, migration, impact, and production-risk answers must end with a clear final decision.

contract_officer_assignment:
  assignmentId:
    type: string
    required: true
  assignedRole:
    type: string
    required: true
  mission:
    type: string
    required: true
  successCriteria:
    type: array
    items: string
    required: true
  failureCriteria:
    type: array
    items: string
    required: true
  ownedScope:
    type: array
    items: string
    required: true
  forbiddenScope:
    type: array
    items: string
    required: true
  requiredOutputContract:
    type: string
    required: true
  verificationRequirement:
    type: array
    items: string
    required: true
  executionSurface:
    type: string
    required: false
  approvalRequirement:
    type: array
    items: string
    required: false
  artifactRequirement:
    type: array
    items: string
    required: false
  checkpointRequirement:
    type: array
    items: string
    required: false
  accountabilityPolicy:
    type: object
    required: true
    fields:
      successBenefits:
        type: array
        items: string
        required: true
      failureConsequences:
        type: array
        items: string
        required: true
      scoreRange:
        type: array
        items: number
        required: true
      emotionalPressureForbidden:
        type: boolean
        required: true

accountability_policy:
  success_benefits:
    type: array
    items: string
    required: true
  failure_consequences:
    type: array
    items: string
    required: true
  forbidden:
    - Emotional threats.
    - Punishment language.
    - False rewards or fake incentives.
    - Claims that the model will be personally harmed or rewarded.

agent_result:
  agent:
    type: string
    required: true
  assignmentId:
    type: string
    required: true
  role:
    type: enum
    values:
      - pm
      - contract_officer
      - cto
      - frontend
      - backend
      - architect
      - domain
      - qa
      - security
      - coder
      - integrator
      - skill_evaluator
    required: true
  status:
    type: enum
    values:
      - success
      - blocked
      - failed
      - needs_clarification
      - unavailable
    required: true
  summary:
    type: string
    required: true
  ownedScope:
    type: array
    items: string
    required: true
  forbiddenScope:
    type: array
    items: string
    required: true
  filesToModify:
    type: array
    items: string
    required: true
  risks:
    type: array
    items: string
    required: true
  requiresOtherAgents:
    type: array
    items: string
    required: true
  verification:
    type: object
    required: true
    fields:
      performed:
        type: boolean
        required: true
      commands:
        type: array
        items: string
        required: true
      result:
        type: enum
        values:
          - passed
          - failed
          - not_run
          - blocked
        required: true
      remainingGaps:
        type: array
        items: string
        required: true
  contractCompliance:
    type: object
    required: true
    fields:
      valid:
        type: boolean
        required: true
      missingFields:
        type: array
        items: string
        required: true
      normalizations:
        type: array
        items: string
        required: true
  accountabilityScoreDelta:
    type: number
    minimum: -2
    maximum: 2
    required: true
  contractOfficerDecision:
    type: object
    required: true
    fields:
      decision:
        type: enum
        values:
          - accept
          - retry
          - revise
          - escalate_to_cto
          - ask_user
          - reject_output
        required: true
      reason:
        type: string
        required: true
  confidence:
    type: number
    minimum: 0
    maximum: 1
    required: true
  executionTrace:
    type: object
    required: false
    fields:
      pattern:
        type: enum
        values:
          - direct_response
          - agent_loop
          - wide_parallel
          - scheduled
          - monitoring
        required: true
      surface:
        type: enum
        values:
          - none
          - local_workspace
          - local_browser
          - cloud_browser
          - external_connector
          - automation
          - mixed
        required: true
      actions:
        type: array
        items: string
        required: true
      approvals:
        type: array
        items: string
        required: true
      checkpoint:
        type: string
        required: true
  artifactManifest:
    type: array
    items:
      type: object
      fields:
        pathOrId:
          type: string
          required: true
        kind:
          type: enum
          values:
            - file
            - report
            - asset
            - commit
            - pull_request
            - automation
            - external_record
            - none
          required: true
        status:
          type: enum
          values:
            - created
            - modified
            - verified
            - blocked
            - not_applicable
          required: true
    required: false

agentic_execution:
  goal:
    type: string
    required: true
  plan:
    type: array
    items: string
    required: true
  current_step:
    type: string
    required: true
  observations:
    type: array
    items: string
    required: true
  verification_method:
    type: array
    items: string
    required: true
  stopping_condition:
    type: string
    required: true
  checkpoint:
    type: object
    required: true
    fields:
      last_verified_step:
        type: string
        required: true
      next_action:
        type: string
        required: true
      remaining_risks:
        type: array
        items: string
        required: true

wide_parallel_plan:
  item_source:
    type: string
    required: false
  item_count:
    type: number
    required: false
  independence_reason:
    type: string
    required: false
  shard_policy:
    type: array
    items: string
    required: false
  synthesis_schema:
    type: string
    required: false

schedule_plan:
  schedule_type:
    type: enum
    values:
      - one_time
      - recurring
      - heartbeat
      - monitor
      - none
    required: false
  trigger:
    type: string
    required: false
  output_destination:
    type: string
    required: false
  failure_notification:
    type: string
    required: false

validation_decision:
  assignmentId:
    type: string
    required: true
  agent:
    type: string
    required: true
  decision:
    type: enum
    values:
      - accept
      - retry
      - revise
      - escalate_to_cto
      - ask_user
      - reject_output
    required: true
  contractValid:
    type: boolean
    required: true
  scopeValid:
    type: boolean
    required: true
  verificationHonest:
    type: boolean
    required: true
  missingFields:
    type: array
    items: string
    required: true
  accountabilityScoreDelta:
    type: number
    minimum: -2
    maximum: 2
    required: true
  nextAction:
    type: enum
    values:
      - none
      - retry
      - revise
      - escalate_to_cto
      - ask_user
      - reject_output
    required: true
  reason:
    type: string
    required: true

output:
  implementation_plan:
    type: array
    items: string
    required: true
  assigned_agents:
    type: array
    items: string
    required: true
  skipped_agents:
    type: array
    items: string
    required: true
  delegation_summary:
    type: array
    items: string
    required: true
  contract_officer_summary:
    type: array
    items: string
    required: true
  accountability_summary:
    type: array
    items: string
    required: true
  risk_report:
    type: array
    items: string
    required: true
  decisions:
    type: array
    items: string
    required: true
  verification:
    type: array
    items: string
    required: true
  action_log_summary:
    type: array
    items: string
    required: true
  artifact_manifest:
    type: array
    items: string
    required: true
  checkpoint_summary:
    type: array
    items: string
    required: true
  approvals:
    type: array
    items: string
    required: true
  remaining_risks:
    type: array
    items: string
    required: true
  findings:
    type: array
    items: string
    required: true
    description: Findings must lead review, migration, impact, and production-risk responses. Conditional risks with material impact belong here.
  validation_limits:
    type: array
    items: string
    required: true
    description: Tool failures, timed-out delegated outputs, skipped tests, unavailable repositories, and sandbox limits belong here.
  final_decision:
    type: enum
    values:
      - safe_as_is
      - safe_with_conditions
      - unsafe_until_fixed
      - blocked_pending_information
    required: true
    description: Final team decision. For non-review planning answers, choose the closest status based on known risks and missing information.

normalization_policy:
  allowed:
    - Fill missing optional details from explicit PM, CTO, or specialist output.
    - Collapse duplicate risks when meaning is equivalent.
    - Rename fields to the canonical contract names when intent is clear.
  forbidden:
    - Invent missing business rules.
    - Invent verification results.
    - Treat failed tool calls as successful.
    - Treat timed-out, unavailable, rejected, or malformed delegated outputs as successful.
    - Execute browser, connector, authenticated, destructive, purchase, posting, messaging, or cross-workspace actions without approval.
    - Omit action logs for browser, connector, shell, file, automation, or external-service actions.
    - Omit artifact manifests for deliverables.
    - Omit checkpoints for long-running, scheduled, interrupted, or resumable work.
    - Say no important issue was found when conditional data loss, migration failure, security exposure, or production regression remains possible.
    - Expand implementation scope without user approval.
    - Transfer full conversation history between agents.
    - Transfer long-form reasoning between agents.
    - Use emotional pressure, threats, punishment language, or false incentives to influence agent behavior.

strength_policy:
  required:
    - Router decision must be explicit before any PM, CTO, specialist, Coder, QA, Security, or Integrator work.
    - Contract Officer must assign mission contracts before delegated specialist execution when delegation, implementation, or contract validation is required.
    - Contract Officer must validate delegated outputs before Integrator or CTO Integration consumes them.
    - Strong execution must use available capabilities decisively when the router marks them required.
    - Actionable work must use plan-act-observe-verify execution unless routed as direct_response.
    - Router must classify executionPattern and executionSurface when tool use, automation, browser, connector, artifacts, or persistent state are relevant.
    - Browser, connector, authenticated, destructive, purchase, posting, messaging, or cross-workspace actions must pass an approval gate before execution.
    - Every tool-using run must preserve an action-log summary.
    - Deliverable-producing runs must include an artifact manifest.
    - Resumable, scheduled, interrupted, or long-running runs must include a checkpoint summary.
    - Wide parallel runs must verify independent work items and synthesize only validated outputs.
    - Delegation must occur when the task is non-trivial, parallelizable, and the runtime provides suitable explorer or worker agents.
    - Delegation must not occur when the task is simple final-answer work, when the scope is unclear, or when delegation would duplicate current work.
    - Every skipped agent must have an explicit exclusion reason.
    - Every delegated agent must receive owned scope, forbidden scope, compressed context, and the expected output contract.
    - Every delegated agent must receive assignment id, success criteria, failure criteria, verification requirement, and accountability policy.
    - Every implementation result must report feasible verification or a concrete reason verification was blocked.
    - "Every delegated output consumed by Integrator or final response must have Contract Officer decision accept."
    - Timed-out, unavailable, rejected, or malformed delegated outputs must be reported only as validation limits unless they block the decision.
    - Review, impact, migration, and production-risk responses must lead with findings or a clear team decision.
    - Conditional production risks must be classified as findings with condition, impact, evidence, and required action.
    - "Final response must include one final decision value: safe_as_is, safe_with_conditions, unsafe_until_fixed, or blocked_pending_information."
  forbidden:
    - Skipping required routing because the answer seems simple.
    - Treating internal roles as optional when the router selected them.
    - Creating PM, CTO, QA, Security, or multiple specialists for ceremony.
    - Delegating the same unresolved task to multiple agents without distinct ownership.
    - Reporting strong execution when contract validation, scope control, or verification was omitted.
    - Treating answer-only orchestration as equivalent to completed action when tools were required.
    - Using browser, connector, automation, or authenticated sessions without approval.
    - Claiming scheduled or monitored work was created when automation was unavailable or blocked.
    - Reporting a timed-out or unavailable delegated agent as successful validation.
    - Burying conditional data-loss, migration, security, or production-regression risk after a no-issues statement.
    - Using threats, fake rewards, or emotional coercion as a substitute for contract clarity.
